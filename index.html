<!DOCTYPE html>
<html>
<head>
    <title>Welcome App</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
        }

        #message {
            margin-top: 20px;
            font-size: 24px;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        .show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <h1>Click the Button</h1>
    <button onclick="getMessage()">Click Me</button>

    <div id="message"></div>

<script>
async function getMessage() {
    try {
        const response = await fetch("https://welcome-app-backend-ase7.onrender.com/welcome");
        const data = await response.json();

        console.log(data);

        const msgDiv = document.getElementById("message");
        msgDiv.innerText = data.message;
        msgDiv.style.opacity = "1";

    } catch (error) {
        console.error("Error:", error);
    }
}
</script>

</body>
</html>
